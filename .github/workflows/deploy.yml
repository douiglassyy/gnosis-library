name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Trigger deployment on push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Use Node.js v18 for consistency with local dev
          cache: 'npm' # Cache npm packages for faster builds

      - name: Install Dependencies
        run: npm ci # Use 'ci' for clean installs in CI environments

      - name: Build Astro Site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist # Astro's build output directory